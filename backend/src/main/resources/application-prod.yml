server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://db:5432/tellme_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 50MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Ho_Chi_Minh

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000

app:
  upload:
    dir: ${UPLOAD_DIR:/app/uploads}
  jwt:
    secret: ${JWT_SECRET}
    expiration: 604800000
  cors:
    allowed-origins: ${CORS_ORIGINS:https://yourdomain.com}
  mail:
    enabled: ${MAIL_ENABLED:true}
    from: ${MAIL_FROM}
    base-url: ${APP_BASE_URL:https://yourdomain.com}

logging:
  level:
    com.tellme: INFO
    org.springframework.security: WARN
  file:
    name: /app/logs/tellme.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
